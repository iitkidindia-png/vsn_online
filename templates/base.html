<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VSN Book ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!--Make dropdown searchable-->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/js/select2.min.js"></script>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">VSN ERP</a>
    <div class="d-flex">
      {% if session.get('user') %}
      <a class="btn btn-info" href="/">🏠 Dashboard</a>
      <a class="btn btn-light btn-sm me-2" href="/students">Students</a>
      <a class="btn btn-light btn-sm me-2" href="/report">Sales Report</a>
      <a href="/book_report" class="btn btn-info">Stock Report</a>
      <a class="btn btn-danger btn-sm" href="/logout">Logout</a>
      {% endif %}
    </div>
  </div>
</nav>
<div class="container my-4">
  {% block content %}{% endblock %}
</div>
</body>
</html>
